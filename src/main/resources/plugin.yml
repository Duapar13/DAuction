name: DAuction
version: '${project.version}'
main: com.duapar.dauction.DAuction
api-version: '26.1'
author: Duapar
description: Hôtel des ventes entre joueurs, lié à EconomyService (DAPI).
depend: [DAPI]
# softdepend (pas depend: DEconomy n'est pas obligatoire, un autre plugin
# pourrait fournir EconomyService) : sert uniquement à influencer l'ordre de
# chargement de Bukkit (alphabétique par défaut, DAuction < DEconomy) pour
# que EconomyService soit déjà enregistré quand DAuction s'active.
softdepend: [DEconomy]

permissions:
  dauction.use:
    description: Autorise à vendre, acheter et consulter l'hôtel des ventes.
    default: true
  dauction.admin:
    description: Autorise à annuler la mise en vente de n'importe quel joueur.
    default: op

commands:
  ah:
    description: Hôtel des ventes entre joueurs.
    usage: /ah [sell <prix> [quantité]|my|reclaim|cancel <id>|collect <id>|history|help]
    aliases: [auction, auctionhouse]
